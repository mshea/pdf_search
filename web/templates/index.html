<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_title }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --sidebar-width: 350px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 20px;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
        }

        /* --- Breadcrumb bar (top-level, above everything) --- */
        .breadcrumb-bar {
            padding: 12px 20px;
            border-bottom: 1px solid #333;
            background: #000;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .breadcrumb-bar .crumb { color: #fff; cursor: pointer; }
        .breadcrumb-bar .crumb:hover { text-decoration: underline; }
        .breadcrumb-bar .crumb.current { cursor: default; }
        .breadcrumb-bar .crumb.current:hover { text-decoration: none; }
        .breadcrumb-bar .sep { color: #aaa; margin: 0 8px; }

        /* --- Layout wrapper (sidebar + main) --- */
        .app-body {
            display: flex;
        }

        /* --- Sidebar (desktop: fixed left panel) --- */
        .sidebar {
            width: var(--sidebar-width);
            min-width: 150px;
            background: #000;
            padding: 20px;
            height: calc(100vh - 45px);
            overflow-y: auto;
            position: fixed;
            top: 45px;
            border-right: 1px solid #444;
        }
        .sidebar h3 { color: #fff; margin-top: 0; }
        .sidebar-close-btn { display: none; }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }

        /* --- Resize handle --- */
        .resize-handle {
            width: 6px;
            position: fixed;
            top: 45px;
            height: calc(100vh - 45px);
            cursor: col-resize;
            z-index: 100;
            background: transparent;
        }
        .resize-handle:hover,
        .resize-handle.active { background: #fff; }

        /* --- Folder list --- */
        #folder-filter {
            width: 100%;
            padding: 8px 10px;
            font-size: 0.9em;
            font-family: inherit;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            margin-bottom: 10px;
        }
        #folder-filter:focus { outline: none; border-color: #fff; }
        .folder-item { padding: 6px 0; cursor: pointer; }
        .folder-item:hover .folder-name { text-decoration: underline; }
        .folder-name { color: #fff; }
        .folder-count { color: #aaa; font-size: 0.8em; }

        /* --- Main content --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-width: 0;
        }
        .content-inner {
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .content-wrapper {
            width: 100%;
            max-width: 900px;
        }
        .mobile-folder-btn { display: none; }

        /* --- Search form --- */
        h1 { color: #fff; }
        .stats { color: #fff; margin-bottom: 20px; }
        .reindex-status { color: #aaa; font-size: 0.85em; }
        .reindex-link { color: #aaa; text-decoration: underline; text-decoration-color: #555; cursor: pointer; }
        .reindex-link:hover { color: #fff; }
        .search-help { color: #aaa; font-size: 0.85em; margin-bottom: 10px; line-height: 1.6; }
        .example-query { color: #aaa; text-decoration: underline; text-decoration-color: #555; }
        .example-query:hover { color: #fff; }
        form { margin: 20px 0; }
        input[type="text"] {
            width: calc(100% - 130px);
            max-width: 600px;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            background: #111;
            color: #fff;
            border: 2px solid #555;
        }
        input[type="submit"] {
            padding: 12px 20px;
            font-size: 16px;
            font-family: inherit;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
        }

        /* --- Sort bar --- */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        .sort-bar span { color: #aaa; }
        .sort-btn {
            background: none;
            border: 1px solid #555;
            color: #fff;
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
        }
        .sort-btn:hover { border-color: #fff; }
        .sort-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* --- Results --- */
        .results-info { margin: 20px 0 10px 0; color: #fff; }
        .result { margin: 0; padding: 0.75em 0; background: none; border-bottom: 1px solid #333; }
        .result-title {
            font-weight: bold;
            color: #fff;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        .result-title a { color: #fff; text-decoration: none; }
        .result-snippet { margin: 2px 0 0 0; line-height: 1.4; color: #fff; overflow-wrap: break-word; word-break: break-word; }
        mark { background: #fff; color: #000; padding: 2px 4px; }
        .result-meta { color: #aaa; font-size: 0.85em; margin-top: 6px; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            body { font-size: 18px; overflow-x: hidden; }
            .breadcrumb-bar { position: sticky; top: 0; z-index: 1100; }
            .app-body { display: block; }
            .sidebar {
                display: none;
                position: fixed;
                top: 45px;
                left: 0;
                width: 100% !important;
                max-width: none !important;
                height: calc(100vh - 45px);
                z-index: 1000;
                border-right: none;
                font-size: 20px;
            }
            .sidebar.open { display: block; }
            .sidebar-overlay.open { display: block; }
            .sidebar-close-btn {
                display: block;
                float: right;
                background: none;
                border: 1px solid #555;
                color: #fff;
                font-size: 20px;
                padding: 4px 12px;
                cursor: pointer;
                margin: 0 0 10px 10px;
            }
            .resize-handle { display: none; }
            .main-content { margin-left: 0 !important; }
            .content-inner { padding: 15px; }
            .mobile-folder-btn {
                display: inline-block;
                padding: 12px 20px;
                font-size: 18px;
                font-family: inherit;
                background: #111;
                color: #fff;
                border: 1px solid #555;
                cursor: pointer;
                margin-bottom: 15px;
            }
            .folder-item { padding: 14px 12px; }
            h1 { font-size: 1.5em; }
            input[type="text"] { width: 100%; max-width: none; }
            input[type="submit"] { width: 100%; margin-top: 10px; padding: 14px; }
            .result { margin: 12px 0; padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="breadcrumb-bar" id="page-breadcrumbs"></div>

    <div class="app-body">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
        <div class="sidebar" id="sidebar">
            <button class="sidebar-close-btn" onclick="closeSidebar()">&#x2715;</button>
            <div style="color: #aaa; font-size: 0.85em; margin-bottom: 10px;">Folders</div>
            <input type="text" id="folder-filter" placeholder="Filter folders..." oninput="filterFolders()">
            <div id="folders-list">Loading...</div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>

        <div class="main-content" id="main-content">
            <div class="content-inner">
                <div class="content-wrapper">
                    <button class="mobile-folder-btn" onclick="openSidebar()">Folders</button>
                    <h1>{{ site_title }}</h1>
                    <div class="stats">{{ total_docs }} documents indexed &middot; <span id="reindex-status" class="reindex-status"></span></div>
                    <div class="search-help">
                        Try: <a href="/?q=%22magic+missile%22" class="example-query">"magic missile"</a>
                        &middot; <a href="/?q=dragon+-chromatic" class="example-query">dragon -chromatic</a>
                        &middot; <a href="/?q=wizard+OR+sorcerer" class="example-query">wizard OR sorcerer</a>
                        &middot; <a href="/?q=necro*" class="example-query">necro*</a>
                        &middot; <a href="/?q=dragon+NEAR%2F5+lair" class="example-query">dragon NEAR/5 lair</a>
                        &middot; <code>path:folder</code> to filter by folder &middot; <code>filename:term</code> for filename-only search
                    </div>
                    <form method="GET" action="/" id="search-form" onsubmit="return handleSubmit(event)">
                        <input type="text" name="q" id="search-input" value="" placeholder="Search PDFs..." autofocus>
                        <input type="submit" value="Search">
                    </form>
                    <div id="results-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPath = '';
        let currentResults = [];
        let currentQuery = null;
        let currentSort = 'relevance';

        // --- Resizable sidebar (desktop only) ---
        (function initResize() {
            const sidebar = document.getElementById('sidebar');
            const handle = document.getElementById('resize-handle');
            const main = document.getElementById('main-content');
            let dragging = false;

            function isMobile() {
                return window.matchMedia('(max-width: 768px)').matches;
            }

            function updateLayout(width) {
                if (isMobile()) return;
                width = Math.max(150, Math.min(width, 600));
                document.documentElement.style.setProperty('--sidebar-width', width + 'px');
                sidebar.style.width = width + 'px';
                handle.style.left = width + 'px';
                main.style.marginLeft = width + 'px';
            }

            updateLayout(sidebar.offsetWidth);

            handle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                dragging = true;
                handle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                updateLayout(e.clientX);
            });

            document.addEventListener('mouseup', function() {
                if (!dragging) return;
                dragging = false;
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });
        })();

        // --- Breadcrumbs ---
        function updatePageBreadcrumbs(path) {
            const div = document.getElementById('page-breadcrumbs');
            let html = '<span class="crumb' + (!path ? ' current' : '') + '" onclick="navigateFolder(\'\')">{{ site_title }}</span>';

            if (path) {
                const parts = path.split('/');
                let accumulated = '';
                parts.forEach(function(part, i) {
                    accumulated += (i > 0 ? '/' : '') + part;
                    const p = accumulated;
                    const isLast = (i === parts.length - 1);
                    html += '<span class="sep">/</span>';
                    html += '<span class="crumb' + (isLast ? ' current' : '') + '" onclick="navigateFolder(\'' + p.replace(/'/g, "\\'") + '\')">' + escapeHtml(part) + '</span>';
                });
            }

            div.innerHTML = html;
        }

        // --- Sorting ---
        function sortResults(results, sortKey) {
            const sorted = results.slice();
            switch (sortKey) {
                case 'name-asc':
                    sorted.sort(function(a, b) { return a.filename.localeCompare(b.filename); });
                    break;
                case 'name-desc':
                    sorted.sort(function(a, b) { return b.filename.localeCompare(a.filename); });
                    break;
                case 'date-asc':
                    sorted.sort(function(a, b) { return (a.modified || '').localeCompare(b.modified || ''); });
                    break;
                case 'date-desc':
                    sorted.sort(function(a, b) { return (b.modified || '').localeCompare(a.modified || ''); });
                    break;
            }
            return sorted;
        }

        function toggleSort(field) {
            if (field === 'relevance') {
                currentSort = 'relevance';
            } else if (field === 'name') {
                currentSort = (currentSort === 'name-asc') ? 'name-desc' : 'name-asc';
            } else if (field === 'date') {
                currentSort = (currentSort === 'date-desc') ? 'date-asc' : 'date-desc';
            }
            var sorted = sortResults(currentResults, currentSort);
            renderResultsList(sorted, currentQuery);
            updateSortButtons();
        }

        function updateSortButtons() {
            document.querySelectorAll('.sort-btn').forEach(function(btn) {
                var field = btn.dataset.field;
                var isActive = (field === 'relevance' && currentSort === 'relevance')
                    || (field === 'name' && currentSort.startsWith('name'))
                    || (field === 'date' && currentSort.startsWith('date'));
                btn.classList.toggle('active', isActive);
                if (field === 'name') btn.textContent = 'Name ' + (currentSort === 'name-desc' ? '\u2193' : '\u2191');
                else if (field === 'date') btn.textContent = 'Date ' + (currentSort === 'date-asc' ? '\u2191' : '\u2193');
            });
        }

        function sortLabel(field) {
            if (field === 'name') return 'Name ' + (currentSort === 'name-desc' ? '\u2193' : '\u2191');
            if (field === 'date') return 'Date ' + (currentSort === 'date-asc' ? '\u2191' : '\u2193');
            return 'Relevance';
        }

        function buildSortBar() {
            return '<div class="sort-bar">'
                + '<span>Sort:</span>'
                + '<button class="sort-btn' + (currentSort === 'relevance' ? ' active' : '') + '" data-field="relevance" onclick="toggleSort(\'relevance\')">Relevance</button>'
                + '<button class="sort-btn' + (currentSort.startsWith('name') ? ' active' : '') + '" data-field="name" onclick="toggleSort(\'name\')">' + sortLabel('name') + '</button>'
                + '<button class="sort-btn' + (currentSort.startsWith('date') ? ' active' : '') + '" data-field="date" onclick="toggleSort(\'date\')">' + sortLabel('date') + '</button>'
                + '</div>';
        }

        // --- Folder filter ---
        let allFolders = [];

        function filterFolders() {
            var query = document.getElementById('folder-filter').value.toLowerCase();
            var filtered = allFolders.filter(function(f) {
                return f.name.toLowerCase().indexOf(query) !== -1;
            });
            if (filtered.length === 0) {
                document.getElementById('folders-list').innerHTML = '<div style="color: #aaa;">No matching folders</div>';
            } else {
                renderFolderList(filtered, currentPath);
            }
        }

        function renderFolderList(folders, basePath) {
            document.getElementById('folders-list').innerHTML = folders.map(function(f) {
                var fullPath = basePath ? basePath + '/' + f.name : f.name;
                return '<div class="folder-item" onclick="navigateFolder(\'' + fullPath.replace(/'/g, "\\'") + '\')">'
                    + '<span class="folder-name">' + escapeHtml(f.name) + '</span> '
                    + '<span class="folder-count">(' + f.count + ')</span>'
                    + '</div>';
            }).join('');
        }

        // --- Init ---
        (function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            const input = document.getElementById('search-input');
            input.value = query;

            const pathMatch = query.match(/path:"([^"]+)"|path:(\S+)/);
            currentPath = pathMatch ? (pathMatch[1] || pathMatch[2]) : '';

            loadFolders(currentPath);
            updatePageBreadcrumbs(currentPath);

            if (query) doSearch(query);
            else if (currentPath) doBrowse(currentPath);

            if (input.value) {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }
        })();

        function handleSubmit(e) {
            e.preventDefault();
            let query = document.getElementById('search-input').value.trim();

            if (currentPath && query && !query.match(/path:/)) {
                query = 'path:"' + currentPath + '" ' + query;
            }

            const url = query ? '/?q=' + encodeURIComponent(query) : '/';
            history.pushState(null, '', url);

            if (query) doSearch(query);
            else if (currentPath) doBrowse(currentPath);
            else document.getElementById('results-container').innerHTML = '';

            return false;
        }

        window.addEventListener('popstate', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';
            document.getElementById('search-input').value = query;
            if (query) doSearch(query);
            else if (currentPath) doBrowse(currentPath);
            else document.getElementById('results-container').innerHTML = '';
        });

        function doSearch(query) {
            const container = document.getElementById('results-container');
            container.innerHTML = '<div class="results-info">Searching...</div>';

            fetch('/search?q=' + encodeURIComponent(query))
                .then(r => r.json())
                .then(data => {
                    currentResults = data.results;
                    currentQuery = data.query;
                    currentSort = 'relevance';
                    renderResults(data.results, data.count, data.query);
                })
                .catch(() => {
                    container.innerHTML = '<div class="results-info" style="color: #f44;">Search error</div>';
                });
        }

        function doBrowse(path) {
            const container = document.getElementById('results-container');
            container.innerHTML = '<div class="results-info">Loading files...</div>';

            fetch('/browse?path=' + encodeURIComponent(path))
                .then(r => r.json())
                .then(data => {
                    currentResults = data.results;
                    currentQuery = null;
                    currentSort = 'name-asc';
                    if (data.count === 0) {
                        container.innerHTML = '<div class="results-info">No files in this folder</div>';
                    } else {
                        renderResults(data.results, data.count, null);
                    }
                })
                .catch(() => {
                    container.innerHTML = '<div class="results-info" style="color: #f44;">Error loading files</div>';
                });
        }

        function renderResults(results, count, query) {
            const container = document.getElementById('results-container');
            let label = query
                ? 'Found ' + count + ' result(s) for "' + escapeHtml(query) + '"'
                : count + ' file(s)';
            let html = '<div class="results-info">' + label + '</div>';
            if (count > 0) html += buildSortBar();
            container.innerHTML = html;

            if (count === 0) {
                container.innerHTML += '<p>No results found.</p>';
            } else {
                var listDiv = document.createElement('div');
                listDiv.id = 'results-list';
                listDiv.innerHTML = buildResultsHtml(sortResults(results, currentSort));
                container.appendChild(listDiv);
            }
        }

        function renderResultsList(results) {
            var listDiv = document.getElementById('results-list');
            if (listDiv) listDiv.innerHTML = buildResultsHtml(results);
        }

        function buildResultsHtml(results) {
            return results.map(function(r) {
                var datePart = r.modified ? r.modified.split(' ')[0] : '';
                var folder = r.path ? r.path.replace(/\/[^\/]*$/, '') : '';
                var html = '<div class="result">'
                    + '<div class="result-title"><a href="/pdf/' + r.id + '" target="_blank">' + escapeHtml(r.filename) + '</a>'
                    + ' <a href="/text/' + r.id + (currentQuery ? '?q=' + encodeURIComponent(currentQuery) : '') + '" target="_blank" style="font-size:0.9em;color:#fff;text-decoration:underline;text-decoration-color:#888;font-weight:normal;">[text]</a></div>'
                    + '<div class="result-meta">' + escapeHtml(folder) + ' &middot; ' + escapeHtml(r.size);
                if (datePart) html += ' &middot; ' + escapeHtml(datePart);
                html += '</div>';
                if (r.snippet) html += '<div class="result-snippet">' + escapeHtml(r.snippet).replace(/&lt;mark&gt;/g, '<mark>').replace(/&lt;\/mark&gt;/g, '</mark>') + '</div>';
                html += '</div>';
                return html;
            }).join('');
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function loadFolders(path) {
            currentPath = path;
            updatePageBreadcrumbs(path);
            document.getElementById('folder-filter').value = '';
            const url = path ? '/folders?path=' + encodeURIComponent(path) : '/folders';

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    allFolders = data.folders;
                    if (data.folders.length === 0) {
                        document.getElementById('folders-list').innerHTML = '<div style="color: #aaa;">No subfolders</div>';
                    } else {
                        renderFolderList(data.folders, path);
                    }
                })
                .catch(function() {
                    document.getElementById('folders-list').innerHTML = '<div style="color: #f44;">Error loading folders</div>';
                });
        }

        function navigateFolder(folder) {
            closeSidebar();
            loadFolders(folder);

            const input = document.getElementById('search-input');
            let searchTerms = input.value.replace(/\s*path:"[^"]+"\s*|\s*path:\S+\s*/g, ' ').trim();

            if (folder) {
                if (searchTerms) {
                    let newQuery = 'path:"' + folder + '" ' + searchTerms;
                    input.value = newQuery;
                    history.pushState(null, '', '/?q=' + encodeURIComponent(newQuery));
                    doSearch(newQuery);
                } else {
                    input.value = '';
                    history.pushState(null, '', '/');
                    doBrowse(folder);
                }
            } else {
                input.value = searchTerms;
                if (searchTerms) {
                    history.pushState(null, '', '/?q=' + encodeURIComponent(searchTerms));
                    doSearch(searchTerms);
                } else {
                    history.pushState(null, '', '/');
                    document.getElementById('results-container').innerHTML = '';
                }
            }

            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }

        function goHome() {
            document.getElementById('search-input').value = '';
            history.pushState(null, '', '/');
            document.getElementById('results-container').innerHTML = '';
            loadFolders('');
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }

        // --- Re-index ---
        var _reindexPoll = null;

        function setReindexStatus(html) {
            document.getElementById('reindex-status').innerHTML = html;
        }

        function refreshDocCount() {
            fetch('/stats').then(function(r) { return r.json(); }).then(function(s) {
                document.querySelector('.stats').firstChild.textContent = s.total_documents + ' documents indexed \u00b7 ';
            });
        }

        function updateLink() {
            return '<a class="reindex-link" onclick="triggerReindex()">update index</a>';
        }

        function friendlyTime(dateStr) {
            var d = new Date(dateStr.replace(' ', 'T'));
            var now = new Date();
            var diffMs = now - d;
            var diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'just now';
            if (diffMin < 60) return diffMin + ' minute' + (diffMin === 1 ? '' : 's') + ' ago';
            var diffHr = Math.floor(diffMin / 60);
            if (diffHr < 24) return diffHr + ' hour' + (diffHr === 1 ? '' : 's') + ' ago';
            var diffDay = Math.floor(diffHr / 24);
            if (diffDay < 7) return diffDay + ' day' + (diffDay === 1 ? '' : 's') + ' ago';
            return d.toLocaleDateString();
        }

        function triggerReindex() {
            setReindexStatus('Updating index...');
            fetch('/reindex', { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function() { pollReindexStatus(); })
                .catch(function() { setReindexStatus('Error starting re-index. ' + updateLink()); });
        }

        function pollReindexStatus() {
            if (_reindexPoll) clearInterval(_reindexPoll);
            _reindexPoll = setInterval(function() {
                fetch('/reindex/status')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.running) {
                            setReindexStatus(data.message || 'Updating index...');
                            refreshDocCount();
                        } else {
                            clearInterval(_reindexPoll);
                            refreshDocCount();
                            if (data.error) {
                                setReindexStatus('Error: ' + escapeHtml(data.error) + ' ' + updateLink());
                            } else if (data.last_run) {
                                setReindexStatus('Last indexed ' + friendlyTime(data.last_run) + ' &middot; ' + updateLink());
                            }
                        }
                    });
            }, 2000);
        }

        // Check indexer state on page load
        fetch('/reindex/status').then(function(r) { return r.json(); }).then(function(data) {
            if (data.running) {
                setReindexStatus(data.message || 'Updating index...');
                pollReindexStatus();
            } else if (data.last_run) {
                setReindexStatus('Last indexed ' + friendlyTime(data.last_run) + ' &middot; ' + updateLink());
            } else {
                setReindexStatus(updateLink());
            }
        });
    </script>
</body>
</html>
